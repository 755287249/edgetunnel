name: Auto Sync Fork

on:
  schedule:
    # 每天 UTC 时间 0:00 自动执行一次（北京时间早上 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许你在网页端手动点击按钮触发

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 赋予写入仓库的权限以更新代码
      
    steps:
      - name: Sync current repository with upstream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo sync ${{ github.repository }}
